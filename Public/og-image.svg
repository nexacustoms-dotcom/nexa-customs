<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111113;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0c0c0e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="og" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fb923c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Orange accent bar top -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#og)"/>

  <!-- Orange glow circle left -->
  <circle cx="120" cy="315" r="180" fill="#f97316" opacity="0.04"/>
  <!-- Orange glow circle right -->
  <circle cx="1100" cy="200" r="220" fill="#f97316" opacity="0.04"/>

  <!-- Logo hexagon -->
  <polygon points="118,220 172,190 226,220 226,280 172,310 118,280" fill="url(#og)" filter="url(#glow)"/>
  <text x="172" y="258" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#000000" text-anchor="middle" dominant-baseline="middle">N</text>

  <!-- Company name -->
  <text x="270" y="232" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#ffffff" dominant-baseline="middle" letter-spacing="-1">NEXA CUSTOMS</text>

  <!-- Orange underline -->
  <rect x="270" y="260" width="560" height="4" fill="url(#og)" rx="2"/>

  <!-- Tagline -->
  <text x="270" y="305" font-family="Arial, sans-serif" font-size="24" fill="#f97316" font-weight="600" dominant-baseline="middle">Print · Signs · Graphics · Vehicle Wraps</text>

  <!-- Divider -->
  <line x1="80" y1="355" x2="1120" y2="355" stroke="#ffffff" stroke-width="0.5" opacity="0.12"/>

  <!-- Service pills -->
  <!-- Pill 1 -->
  <rect x="80" y="378" width="190" height="44" rx="22" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1" stroke-opacity="0.4"/>
  <text x="175" y="400" font-family="Arial, sans-serif" font-size="17" fill="#f97316" text-anchor="middle" dominant-baseline="middle" font-weight="600">Business Cards</text>

  <!-- Pill 2 -->
  <rect x="288" y="378" width="160" height="44" rx="22" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1" stroke-opacity="0.4"/>
  <text x="368" y="400" font-family="Arial, sans-serif" font-size="17" fill="#f97316" text-anchor="middle" dominant-baseline="middle" font-weight="600">Vinyl Banners</text>

  <!-- Pill 3 -->
  <rect x="466" y="378" width="175" height="44" rx="22" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1" stroke-opacity="0.4"/>
  <text x="553" y="400" font-family="Arial, sans-serif" font-size="17" fill="#f97316" text-anchor="middle" dominant-baseline="middle" font-weight="600">Vehicle Wraps</text>

  <!-- Pill 4 -->
  <rect x="659" y="378" width="140" height="44" rx="22" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1" stroke-opacity="0.4"/>
  <text x="729" y="400" font-family="Arial, sans-serif" font-size="17" fill="#f97316" text-anchor="middle" dominant-baseline="middle" font-weight="600">Stickers</text>

  <!-- Pill 5 -->
  <rect x="817" y="378" width="140" height="44" rx="22" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1" stroke-opacity="0.4"/>
  <text x="887" y="400" font-family="Arial, sans-serif" font-size="17" fill="#f97316" text-anchor="middle" dominant-baseline="middle" font-weight="600">Flyers</text>

  <!-- Pill 6 -->
  <rect x="975" y="378" width="145" height="44" rx="22" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1047" y="400" font-family="Arial, sans-serif" font-size="17" fill="#f97316" text-anchor="middle" dominant-baseline="middle" font-weight="600">Real Estate</text>

  <!-- Bottom row -->
  <text x="80" y="468" font-family="Arial, sans-serif" font-size="20" fill="#888888" dominant-baseline="middle">📍 Mississauga, ON · Serving all of GTA · Ships Canada-wide</text>

  <!-- Divider 2 -->
  <line x1="80" y1="505" x2="1120" y2="505" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>

  <!-- Contact row -->
  <text x="80" y="548" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" dominant-baseline="middle" font-weight="600">nexacustoms.ca</text>
  <circle cx="310" cy="548" r="3" fill="#f97316"/>
  <text x="330" y="548" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" dominant-baseline="middle">(437) 997-9921</text>
  <circle cx="580" cy="548" r="3" fill="#f97316"/>
  <text x="600" y="548" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" dominant-baseline="middle">info@nexacustoms.ca</text>

  <!-- Free proof badge -->
  <rect x="940" y="520" width="180" height="52" rx="10" fill="url(#og)"/>
  <text x="1030" y="542" font-family="Arial Black, sans-serif" font-size="14" fill="#000000" text-anchor="middle" dominant-baseline="middle" font-weight="900">FREE PROOF</text>
  <text x="1030" y="560" font-family="Arial, sans-serif" font-size="12" fill="#000000" text-anchor="middle" dominant-baseline="middle">on every order</text>

  <!-- Orange accent bar bottom -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#og)"/>
</svg>
